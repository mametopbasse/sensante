<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SenSante - Pré-diagnostic</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen">

    <!-- HEADER -->
    <header class="bg-blue-600 text-white py-4 shadow-lg">
        <div class="max-w-4xl mx-auto px-4">

            <h1 class="text-2xl font-bold">
                SenSante
            </h1>

            <p class="text-blue-100 text-sm">
                Assistant pré-diagnostic médical
            </p>

        </div>
    </header>

    <!-- MAIN -->
    <main class="max-w-4xl mx-auto px-4 py-8">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <!-- FORMULAIRE -->
            <div id="form-section" class="bg-white rounded-xl shadow-md p-6">

                <h2 class="text-xl font-bold text-gray-800 mb-4">
                    Symptômes du patient
                </h2>

                <!-- NOM -->
                <div class="mb-3">

                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Nom du patient
                    </label>

                    <input
                        type="text"
                        id="nom"
                        placeholder="Ex : Awa Diallo"
                        class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    />

                </div>

                <!-- AGE -->
                <div class="mb-3">

                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Âge
                    </label>

                    <input
                        type="number"
                        id="age"
                        min="0"
                        max="120"
                        placeholder="Ex : 28"
                        class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    />

                </div>

                <!-- SEXE -->
                <div class="mb-3">

                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Sexe
                    </label>

                    <select
                        id="sexe"
                        class="w-full border border-gray-300 rounded-lg p-2"
                    >
                        <option value="F">Féminin</option>
                        <option value="M">Masculin</option>
                    </select>

                </div>

                <!-- TEMPERATURE -->
                <div class="mb-3">

                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Température (°C)
                    </label>

                    <input
                        type="number"
                        id="temperature"
                        step="0.1"
                        min="35"
                        max="42"
                        placeholder="Ex : 38.5"
                        class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    />

                </div>

                <!-- TENSION -->
                <div class="mb-3">

                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Tension systolique
                    </label>

                    <input
                        type="number"
                        id="tension_sys"
                        min="60"
                        max="250"
                        placeholder="Ex : 120"
                        class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    />

                </div>

                <!-- SYMPTOMES -->
                <div class="mb-3">

                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Symptômes
                    </label>

                    <div class="space-y-2">

                        <label class="flex items-center">
                            <input
                                type="checkbox"
                                id="toux"
                                class="rounded text-blue-600 mr-2"
                            />

                            <span class="text-gray-700">
                                Toux
                            </span>
                        </label>

                        <label class="flex items-center">
                            <input
                                type="checkbox"
                                id="fatigue"
                                class="rounded text-blue-600 mr-2"
                            />

                            <span class="text-gray-700">
                                Fatigue
                            </span>
                        </label>

                        <label class="flex items-center">
                            <input
                                type="checkbox"
                                id="maux_tete"
                                class="rounded text-blue-600 mr-2"
                            />

                            <span class="text-gray-700">
                                Maux de tête
                            </span>
                        </label>

                    </div>

                </div>

                <!-- REGION -->
                <div class="mb-4">

                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Région
                    </label>

                    <select
                        id="region"
                        class="w-full border border-gray-300 rounded-lg p-2"
                    >
                        <option value="Dakar">Dakar</option>
                        <option value="Thies">Thiès</option>
                        <option value="Saint-Louis">Saint-Louis</option>
                        <option value="Ziguinchor">Ziguinchor</option>
                        <option value="Tambacounda">Tambacounda</option>
                        <option value="Kaolack">Kaolack</option>
                        <option value="Diourbel">Diourbel</option>
                        <option value="Fatick">Fatick</option>
                        <option value="Kolda">Kolda</option>
                        <option value="Matam">Matam</option>
                    </select>

                </div>

                <!-- BOUTON -->
                <button
                    onclick="diagnostiquer()"
                    class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition duration-200 shadow-md"
                >
                    Diagnostiquer
                </button>

            </div>

            <!-- RESULTAT -->
            <div id="result-section">

                <div class="bg-white rounded-xl shadow-md p-6 text-center text-gray-400">

                    <p class="text-4xl mb-3">
                        🩺
                    </p>

                    <p class="font-medium">
                        Remplissez le formulaire
                    </p>

                    <p class="text-sm mt-1">
                        puis cliquez sur Diagnostiquer
                    </p>

                </div>

            </div>

        </div>

        <!-- HISTORIQUE -->
        <div id="historique-section" class="mt-8 hidden">

            <h2 class="text-lg font-bold text-gray-800 mb-3">
                📋 Historique des consultations
            </h2>

            <div class="bg-white rounded-xl shadow-md overflow-hidden">

                <table class="w-full text-sm">

                    <thead class="bg-gray-100 text-gray-600 uppercase text-xs">

                        <tr>
                            <th class="px-4 py-3 text-left">#</th>
                            <th class="px-4 py-3 text-left">Patient</th>
                            <th class="px-4 py-3 text-left">Diagnostic</th>
                            <th class="px-4 py-3 text-left">Probabilité</th>
                            <th class="px-4 py-3 text-left">Confiance</th>
                            <th class="px-4 py-3 text-left">Heure</th>
                        </tr>

                    </thead>

                    <tbody id="historique-body"></tbody>

                </table>

            </div>

        </div>

    </main>

    <!-- FOOTER -->
    <footer class="text-center text-gray-400 text-sm py-4">
        SenSante v0.3 - ESP / UCAD - L2 GLSI 2026
    </footer>

    <!-- JAVASCRIPT -->
    <script>

        const API_URL = "";

        const historique = [];

        // ============================================
        // DIAGNOSTIC
        // ============================================

        async function diagnostiquer() {

            const patient = {

                age: parseInt(document.getElementById("age").value),

                sexe: document.getElementById("sexe").value,

                temperature: parseFloat(
                    document.getElementById("temperature").value
                ),

                tension_sys: parseInt(
                    document.getElementById("tension_sys").value
                ),

                toux: document.getElementById("toux").checked,

                fatigue: document.getElementById("fatigue").checked,

                maux_tete: document.getElementById("maux_tete").checked,

                region: document.getElementById("region").value
            };

            if (
                patient.age === "" ||
                isNaN(patient.age) ||
                isNaN(patient.temperature) ||
                isNaN(patient.tension_sys)
            ) {
                afficherErreur("Veuillez remplir tous les champs.");
                return;
            }

            afficherChargement();

            try {

                const response = await fetch(API_URL + "/predict", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify(patient)
                });

                const resultat = await response.json();

                if (!response.ok) {
                    throw new Error(JSON.stringify(resultat));
                }

                afficherResultat(resultat);

                const nomVal =
                    document.getElementById("nom").value.trim() || "Inconnu";

                ajouterHistorique(nomVal, resultat);

            } catch (error) {

                console.error(error);

                afficherErreur(
                    "Impossible de contacter l'API."
                );
            }
        }

        // ============================================
        // CHARGEMENT
        // ============================================

        function afficherChargement() {

            document.getElementById("result-section").innerHTML = `

                <div class="bg-white rounded-xl shadow-md p-6 text-center">

                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>

                    <p class="text-gray-500">
                        Analyse en cours...
                    </p>

                </div>
            `;
        }

        // ============================================
        // RESULTAT
        // ============================================

        function afficherResultat(r) {

            const couleurs = {

                palu: {
                    bg: "bg-red-100",
                    text: "text-red-800",
                    bar: "bg-red-500",
                    badge: "bg-red-500"
                },

                grippe: {
                    bg: "bg-orange-100",
                    text: "text-orange-800",
                    bar: "bg-orange-500",
                    badge: "bg-orange-500"
                },

                typh: {
                    bg: "bg-yellow-100",
                    text: "text-yellow-800",
                    bar: "bg-yellow-500",
                    badge: "bg-yellow-500"
                },

                sain: {
                    bg: "bg-green-100",
                    text: "text-green-800",
                    bar: "bg-green-500",
                    badge: "bg-green-500"
                }
            };

            const icones = {
                palu: "🦟",
                grippe: "🤧",
                typh: "🌡️",
                sain: "✅"
            };

            const c = couleurs[r.diagnostic] || couleurs["sain"];

            const ico = icones[r.diagnostic] || "❓";

            const pct = Math.round(r.probabilite * 100);

            document.getElementById("result-section").innerHTML = `

                <div class="bg-white rounded-xl shadow-md p-6">

                    <h2 class="text-xl font-bold text-gray-800 mb-4">
                        Résultat
                    </h2>

                    <div class="${c.bg} rounded-lg p-4 mb-4 flex items-center gap-3">

                        <span class="text-4xl">
                            ${ico}
                        </span>

                        <div>

                            <p class="text-sm text-gray-600">
                                Diagnostic :
                            </p>

                            <p class="text-2xl font-bold ${c.text} uppercase mt-1">
                                ${r.diagnostic}
                            </p>

                        </div>

                    </div>

                    <div class="mb-4">

                        <div class="flex justify-between mb-1">

                            <span class="text-sm text-gray-600">
                                Probabilité
                            </span>

                            <span class="text-sm font-bold ${c.text}">
                                ${pct}%
                            </span>

                        </div>

                        <div class="w-full bg-gray-200 rounded-full h-3">

                            <div
                                class="${c.bar} h-3 rounded-full transition-all duration-500"
                                style="width:${pct}%">
                            </div>

                        </div>

                    </div>

                    <div class="flex items-center gap-2 mb-3">

                        <span class="${c.badge} text-white text-xs px-2 py-1 rounded-full">
                            ${r.confiance}
                        </span>

                        <span class="text-sm text-gray-600">
                            confiance
                        </span>

                    </div>

                    <div class="bg-gray-50 rounded-lg p-3">

                        <p class="text-sm text-gray-700">
                            ${r.message}
                        </p>

                    </div>

                </div>
            `;

            demanderExplication(r);
        }

        // ============================================
        // EXPLICATION IA
        // ============================================

        async function demanderExplication(diagnostic_data) {

            const explainData = {

                diagnostic: diagnostic_data.diagnostic,

                probabilite: diagnostic_data.probabilite,

                confiance: diagnostic_data.confiance,

                age: parseInt(document.getElementById("age").value),

                sexe: document.getElementById("sexe").value,

                temperature: parseFloat(
                    document.getElementById("temperature").value
                ),

                region: document.getElementById("region").value
            };

            const section =
                document.getElementById("result-section");

            const explDiv =
                document.createElement("div");

            explDiv.innerHTML = `

                <div class="mt-4 bg-purple-50 rounded-lg p-4 border border-purple-200">

                    <p class="text-sm text-purple-600 font-medium mb-2">
                        Explication IA (Llama 3)
                    </p>

                    <p class="text-gray-500 text-sm animate-pulse">
                        Génération en cours...
                    </p>

                </div>
            `;

            section.querySelector(".bg-white")
                .appendChild(explDiv);

            try {

                const response = await fetch(
                    API_URL + "/explain",
                    {
                        method: "POST",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        body: JSON.stringify(explainData)
                    }
                );

                const result = await response.json();

                if (response.ok) {

                    explDiv.innerHTML = `

                        <div class="mt-4 bg-purple-50 rounded-lg p-4 border border-purple-200">

                            <p class="text-sm text-purple-600 font-medium mb-2">
                                Explication IA (Llama 3)
                            </p>

                            <p class="text-gray-700 text-sm leading-relaxed">
                                ${result.explication}
                            </p>

                        </div>
                    `;
                }

                else {

                    explDiv.innerHTML = `

                        <div class="mt-4 bg-red-50 rounded-lg p-4 border border-red-200">

                            <p class="text-red-700 font-medium mb-2">
                                Erreur IA
                            </p>

                            <p class="text-red-600 text-sm">
                                ${JSON.stringify(result)}
                            </p>

                        </div>
                    `;
                }

            } catch (error) {

                console.error(
                    "Erreur explication IA :",
                    error
                );

                explDiv.innerHTML = `

                    <div class="mt-4 bg-gray-50 rounded-lg p-3">

                        <p class="text-gray-400 text-sm">
                            Explication non disponible.
                        </p>

                    </div>
                `;
            }
        }

        // ============================================
        // ERREUR
        // ============================================

        function afficherErreur(msg) {

            document.getElementById("result-section").innerHTML = `

                <div class="bg-red-50 border border-red-200 rounded-xl p-6">

                    <p class="text-red-700 font-medium">
                        ${msg}
                    </p>

                </div>
            `;
        }

        // ============================================
        // HISTORIQUE
        // ============================================

        function ajouterHistorique(nom, r) {

            const heure = new Date().toLocaleTimeString(
                "fr-FR",
                {
                    hour: "2-digit",
                    minute: "2-digit"
                }
            );

            const pct =
                Math.round(r.probabilite * 100);

            historique.unshift({

                nom,

                diagnostic: r.diagnostic,

                probabilite: pct,

                confiance: r.confiance,

                heure
            });

            if (historique.length > 5) {
                historique.pop();
            }

            document
                .getElementById("historique-section")
                .classList.remove("hidden");

            document.getElementById(
                "historique-body"
            ).innerHTML = historique.map((h, i) => `

                <tr class="hover:bg-gray-50 border-t border-gray-100">

                    <td class="px-4 py-3 text-gray-400">
                        ${i + 1}
                    </td>

                    <td class="px-4 py-3 font-medium text-gray-800">
                        ${h.nom}
                    </td>

                    <td class="px-4 py-3 font-semibold uppercase text-sm">
                        ${h.diagnostic}
                    </td>

                    <td class="px-4 py-3 font-bold text-gray-700">
                        ${h.probabilite}%
                    </td>

                    <td class="px-4 py-3 text-gray-600 capitalize">
                        ${h.confiance}
                    </td>

                    <td class="px-4 py-3 text-gray-400 text-xs">
                        ${h.heure}
                    </td>

                </tr>

            `).join("");
        }

    </script>

</body>
</html>
